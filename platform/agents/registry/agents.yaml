# platform/agents/registry/agents.yaml
#
# Canonical registry of agent types known to the platform. Each entry
# declares which capabilities (from capabilities.yaml) an agent_type
# implements. This registry is consulted by workflow validation to confirm
# that a WorkflowDefinition's required_agents/required_capabilities can
# actually be satisfied. This file is pure data — it contains no executable
# agent logic; agent runtimes are a Phase 2 concern.

agents:
  - agent_type: research
    version: 1.0.0
    description: >
      Performs the `research` capability: enumerates and ranks candidate
      public sources for a given query.
    capabilities: [research]
    manifest_schema_ref: contracts/agent/agent-manifest.schema.json

  - agent_type: extraction
    version: 1.0.0
    description: >
      Performs the `extraction` capability: collects structured Evidence
      from a single identified Source.
    capabilities: [extraction]
    manifest_schema_ref: contracts/agent/agent-manifest.schema.json

  - agent_type: discovery
    version: 1.0.0
    description: >
      Performs the `discovery` capability: proposes candidate Entities and
      Relationships from a set of Evidence items.
    capabilities: [discovery]
    manifest_schema_ref: contracts/agent/agent-manifest.schema.json

  - agent_type: investigation
    version: 1.0.0
    description: >
      Performs the `investigation` capability: synthesizes Findings with
      confidence rationale from Evidence, Entities, and Relationships.
    capabilities: [investigation]
    manifest_schema_ref: contracts/agent/agent-manifest.schema.json

  - agent_type: reporting
    version: 1.0.0
    description: >
      Performs the `reporting` capability: drafts human-reviewable Reports
      from one or more Findings.
    capabilities: [reporting]
    manifest_schema_ref: contracts/agent/agent-manifest.schema.json

  - agent_type: monitoring
    version: 1.0.0
    description: >
      Performs the `monitoring` capability: re-checks previously recorded
      subjects on a schedule and emits change events.
    capabilities: [monitoring]
    manifest_schema_ref: contracts/agent/agent-manifest.schema.json
